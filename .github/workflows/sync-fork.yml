name: Scheduled Fork Sync

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 2:00 PM
  workflow_dispatch: # Allows you to manually trigger the sync via the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Upstream
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.mergeUpstream({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'main' // Change this to your default branch if it is 'master'
              });
              console.log('Successfully synced with upstream!');
            } catch (error) {
              core.setFailed(`Sync failed: ${error.message}`);
            }